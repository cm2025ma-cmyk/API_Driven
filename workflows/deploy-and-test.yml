name: Deploy EC2 API with LocalStack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Permet aussi de lancer manuellement depuis l'onglet "Actions" de GitHub
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install AWS CLI & LocalStack
        run: |
          pip install awslocal boto3
          # Installation de LocalStack (version complète pour avoir tous les services)
          pip install localstack[full]

      - name: Start LocalStack
        run: |
          localstack start -d
          # Attendre que LocalStack soit prêt
          until curl -s http://localhost:4566/_localstack/health | grep -q "running"; do
            echo "Waiting for LocalStack..."
            sleep 2
          done
          echo "LocalStack is ready!"

      - name: Configure AWS Credentials (LocalStack)
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1
          # Point vers l'endpoint LocalStack
          export AWS_ENDPOINT_URL=http://localhost:4566

      - name: Setup IAM Role & Policy
        run: |
          # Création du rôle et de la politique (adaptez le contenu selon vos besoins)
          cat <<EOF > /tmp/iam_policy.json
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["ec2:*", "logs:*"],
                "Resource": "*"
              }
            ]
          }
          EOF
          
          awslocal iam create-role --role-name lambda-ec2-role --assume-role-policy-document '{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {"Service": "lambda.amazonaws.com"},
              "Action": "sts:AssumeRole"
            }]
          }'
          
          awslocal iam put-role-policy --role-name lambda-ec2-role --policy-name ec2-permissions --policy-document file:///tmp/iam_policy.json

      - name: Deploy Lambda Function
        run: |
          cd src
          zip -r ../function.zip lambda_function.py
          cd ..
          
          awslocal lambda create-function \
            --function-name ec2-controller \
            --runtime python3.9 \
            --handler lambda_function.lambda_handler \
            --role arn:aws:iam::000000000000:role/lambda-ec2-role \
            --zip-file fileb://function.zip \
            --region us-east-1

      - name: Deploy API Gateway
        run: |
          # Script bash inline pour déployer l'API (ou appeler un script externe)
          API_ID=$(awslocal apigateway create-rest-api --name ec2-api --query 'id' --output text)
          ROOT_ID=$(awslocal apigateway get-resources --rest-api-id $API_ID --query 'items[0].id' --output text)
          RESOURCE_ID=$(awslocal apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part control --query 'id' --output text)
          
          awslocal apigateway put-method --rest-api-id $API_ID --resource-id $RESOURCE_ID --http-method POST --authorization-type NONE
          
          awslocal apigateway put-integration \
            --rest-api-id $API_ID \
            --resource-id $RESOURCE_ID \
            --http-method POST \
            --type AWS_PROXY \
            --integration-http-method POST \
            --uri arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-1:000000000000:function:ec2-controller/invocations
          
          DEPLOYMENT_ID=$(awslocal apigateway create-deployment --rest-api-id $API_ID --stage-name dev --query 'id' --output text)
          
          echo "API_ID=$API_ID" >> $GITHUB_ENV
          echo "API_URL=https://$API_ID.execute-api.us-east-1.localhost.localstack.cloud/dev/control" >> $GITHUB_ENV

      - name: Create Test EC2 Instance
        run: |
          INSTANCE_ID=$(awslocal ec2 run-instances --image-id ami-12c6146b --count 1 --instance-type t2.micro --query 'Instances[0].InstanceId' --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Created instance: $INSTANCE_ID"

      - name: Test API - Start Instance
        run: |
          curl -X POST ${{ env.API_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"action\": \"start\", \"instance_id\": \"${{ env.INSTANCE_ID }}\"}"
          
          # Vérifier que l'instance est bien démarrée
          awslocal ec2 describe-instances --instance-ids ${{ env.INSTANCE_ID }} --query 'Reservations[0].Instances[0].State.Name' --output text

      - name: Test API - Stop Instance
        run: |
          curl -X POST ${{ env.API_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"action\": \"stop\", \"instance_id\": \"${{ env.INSTANCE_ID }}\"}"
          
          # Vérifier que l'instance est bien arrêtée
          awslocal ec2 describe-instances --instance-ids ${{ env.INSTANCE_ID }} --query 'Reservations[0].Instances[0].State.Name' --output text

      - name: Cleanup
        if: always()
        run: |
          echo "Nettoyage de l'environnement..."
          # Arrêter l'instance si elle est encore là
          awslocal ec2 stop-instances --instance-ids ${{ env.INSTANCE_ID }} || true
          awslocal ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }} || true
          # Supprimer les ressources AWS
          awslocal lambda delete-function --function-name ec2-controller || true
          awslocal apigateway delete-rest-api --rest-api-id ${{ env.API_ID }} || true
          awslocal iam delete-role --role-name lambda-ec2-role || true
