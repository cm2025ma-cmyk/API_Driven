      - name: Start LocalStack via Docker
        run: |
          echo "Démarrage de LocalStack (Pro Edition)..."
          
          # Lancer le conteneur avec le token Pro
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -p 4510-4559:4510-4559 \
            -e LOCALSTACK_API_KEY="${{ secrets.LOCALSTACK_API_KEY }}" \
            -e SERVICES="ec2,lambda,apigateway,iam,logs" \
            localstack/localstack:latest
          
          # Attendre que le conteneur soit prêt
          echo "Attente du démarrage..."
          sleep 15
          
          # Affichage des logs pour debug
          echo "--- Logs initiaux ---"
          docker logs localstack --tail 30
          
          # Boucle d'attente robuste
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            # Vérification du port et du health endpoint
            if curl -s --connect-timeout 2 http://localhost:4566/_localstack/health | grep -q '"running"'; then
              echo "✅ LocalStack est prêt !"
              break
            fi
            echo "Tentative $((attempt+1))/$max_attempts : En attente..."
            sleep 3
            attempt=$((attempt+1))
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Échec : LocalStack n'est pas prêt."
            echo "--- Logs complets ---"
            docker logs localstack
            exit 1
          fi
