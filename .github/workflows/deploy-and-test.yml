      - name: Start LocalStack (Community Mode)
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_API_KEY }} # Utilise le nom de ton secret
          ACTIVATE_PRO: "0"
          DEBUG: "1"
        run: |
          echo "🚀 Démarrage de LocalStack..."
          
          # Lancement en arrière-plan (mode natif, pas de docker run manuel ici car LocalStack gère mieux ses dépendances)
          # On utilise localstack start -d car c'est plus stable pour gérer les plugins internes
          localstack start -d
          
          # Attente robuste avec plus de temps
          max_attempts=30
          attempt=0
          echo "En attente que LocalStack soit prêt (max ${max_attempts} tentatives)..."
          
          while [ $attempt -lt $max_attempts ]; do
            # On essaie de récupérer le JSON et on vérifie si le statut global est 'ready' ou 'running'
            HEALTH_CHECK=$(curl -s http://localhost:4566/_localstack/health 2>/dev/null)
            
            if echo "$HEALTH_CHECK" | grep -q '"status": "ready"'; then
              echo "✅ LocalStack est prêt (Status: ready) !"
              break
            elif echo "$HEALTH_CHECK" | grep -q '"running"'; then
              echo "✅ LocalStack est prêt (Status: running) !"
              break
            fi
            
            attempt=$((attempt+1))
            if [ $((attempt % 10)) -eq 0 ]; then
               echo "Tentative $attempt/$max_attempts : En attente... (Dernier log: $(tail -n 1 /proc/$(pgrep -f localstack)/cmdline 2>/dev/null || echo 'checking'))"
            fi
            sleep 3
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Échec : LocalStack n'est pas prêt après ${max_attempts} tentatives."
            echo "--- Derniers logs LocalStack ---"
            localstack logs --tail 50
            exit 1
          fi
          
          echo "✅ Vérification finale réussie."
