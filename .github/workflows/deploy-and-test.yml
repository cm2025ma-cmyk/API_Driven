      - name: Start LocalStack (Com edition)
        env:
          ACTIVATE_PRO: "0"  # Ajout crucial pour éviter l'erreur de licence
        run: |
          echo "Démarrage de LocalStack (Mode Natif - Pro)..."
          
          # Démarrer LocalStack en arrière-plan
          localstack start -d
          
          # Attendre que LocalStack soit prêt
          max_attempts=30  # Légèrement augmenté de 15 à 30 pour plus de marge
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"running"'; then
              echo "✅ LocalStack est prêt !"
              break
            fi
            echo "Tentative $((attempt+1))/$max_attempts : En attente..."
            sleep 3
            attempt=$((attempt+1))
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Échec : LocalStack n'est pas prêt."
            localstack logs --follow &
            sleep 5
            exit 1
          fi
