name: Deploy EC2 API with LocalStack

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  LOCALSTACK_API_KEY: ${{ secrets.LOCALSTACK_API_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install localstack boto3 awscli-local
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Start LocalStack (Native Mode)
        env:
          LOCALSTACK_ACTIVATE_PRO: "0"
        run: |
          echo "Démarrage de LocalStack (Mode Natif - Pro)..."
          
          # Démarrer LocalStack en arrière-plan
          localstack start -d
          
          # Attendre que LocalStack soit prêt
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"running"'; then
              echo "✅ LocalStack est prêt !"
              break
            fi
            echo "Tentative $((attempt+1))/$max_attempts : En attente..."
            sleep 3
            attempt=$((attempt+1))
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Échec : LocalStack n'est pas prêt."
            localstack logs --follow &
            sleep 5
            exit 1
          fi

      - name: Configure AWS Credentials
        run: |
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws confi
